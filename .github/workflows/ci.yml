name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/home_fund_ci
      BETTER_AUTH_URL: http://localhost:3000
      BETTER_AUTH_SECRET: ci-only-placeholder-secret
      MEMBER_BINDING_TOKEN_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      GOOGLE_CLIENT_ID: ci-google-client-id
      GOOGLE_CLIENT_SECRET: ci-google-client-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        run: corepack pnpm db:validate

      - name: Type check
        run: corepack pnpm type-check

      - name: Lint
        run: corepack pnpm lint

      - name: Unit tests
        run: corepack pnpm test

      - name: Build
        run: corepack pnpm build
