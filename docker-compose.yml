services:
  postgres:
    image: postgres:16-alpine
    container_name: home-fund-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: home_fund
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d home_fund"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
